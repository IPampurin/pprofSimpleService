<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoadTest API — сумма, Фибоначчи, память</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="wb-header">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">Load<span>Test</span></div>
        </div>
        <div class="header-tagline">
            <span>📊</span> API для профилирования CPU и памяти
        </div>
    </header>

    <div class="container">
        <!-- Карточка: сумма (на всю ширину) -->
        <div class="card card-full">
            <div class="card-header">
                <span class="card-icon">➕</span>
                <h2>GET /sum</h2>
            </div>
            <div class="card-body">
                <div class="param-row">
                    <div class="param-group">
                        <label>a</label>
                        <input type="number" id="sumA" value="15" step="1">
                    </div>
                    <div class="param-group">
                        <label>b</label>
                        <input type="number" id="sumB" value="27" step="1">
                    </div>
                </div>
                <button id="sumBtn" class="wb-button">Вычислить сумму</button>
                <div class="result-area">
                    <span class="result-label">Результат:</span>
                    <span id="sumResult" class="result-value">—</span>
                </div>
            </div>
        </div>

        <!-- Две карточки в ряд -->
        <div class="row-cards">
            <!-- Карточка: число Фибоначчи -->
            <div class="card card-half">
                <div class="card-header">
                    <span class="card-icon">🌀</span>
                    <h2>GET /fib</h2>
                </div>
                <div class="card-body">
                    <div class="param-group">
                        <label>n (1..45)</label>
                        <input type="number" id="fibN" value="40" min="1" max="45" step="1">
                    </div>
                    <button id="fibBtn" class="wb-button">Вычислить Фибоначчи</button>
                    <div class="result-area">
                        <span class="result-label">Результат:</span>
                        <span id="fibResult" class="result-value">—</span>
                    </div>
                </div>
            </div>

            <!-- Карточка: выделение памяти -->
            <div class="card card-half">
                <div class="card-header">
                    <span class="card-icon">💾</span>
                    <h2>POST /allocate</h2>
                </div>
                <div class="card-body">
                    <div class="param-group">
                        <label>Размер в байтах (max 100 млн)</label>
                        <input type="number" id="allocSize" value="1048576" min="1" max="100000000" step="1048576">
                    </div>
                    <button id="allocBtn" class="wb-button">Выделить и освободить</button>
                    <div class="result-area">
                        <span class="result-label">Результат:</span>
                        <span id="allocResult" class="result-value">—</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="wb-footer">
        LoadTest API — инструмент для профилирования и оптимизации (pprof, benchstat, trace)
    </footer>

    <script src="/static/script.js"></script>
</body>
</html>
